<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex API Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 400px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            padding: 0;
        }
        
        .container {
            padding: 20px;
        }
        
        .header {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 20px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .login-form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
        }
        
        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
        }
        
        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #1e40af;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .status {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
        }
        
        .status.success {
            background: #dcfce7;
            color: #166534;
            display: block;
        }
        
        .status.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
        
        .logged-in {
            display: none;
        }
        
        .logged-in.show {
            display: block;
        }
        
        .user-info {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 15px;
        }
        
        .user-info p {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .user-info strong {
            color: #333;
        }
        
        .logout-btn {
            background: #dc2626;
        }
        
        .logout-btn:hover {
            background: #991b1b;
        }
        
        .stats {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .stat {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        
        .stat:last-child {
            border-bottom: none;
        }
        
        .stat-value {
            font-weight: 600;
            color: #2563eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Apex API Tracker</h1>
            <p>Track your LLM API usage</p>
        </div>
        
        <div id="loginSection" class="login-form">
            <div class="status" id="status"></div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button id="loginBtn">Login</button>
        </div>
        
        <div id="loggedInSection" class="logged-in">
            <div class="user-info">
                <p><strong>User ID:</strong> <span id="userId"></span></p>
                <p><strong>Email:</strong> <span id="userEmail"></span></p>
                <p><strong>Status:</strong> <span style="color: #16a34a; font-weight: 600;">✓ Tracking</span></p>
            </div>
            
            <div class="stats">
                <div class="stat">
                    <span>Status</span>
                    <span class="stat-value">Active</span>
                </div>
                <div class="stat">
                    <span>Backend</span>
                    <span class="stat-value">localhost:8000</span>
                </div>
            </div>
            
            <button id="logoutBtn" class="logout-btn" style="margin-top: 15px;">Logout</button>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
